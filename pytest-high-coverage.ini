[pytest]
# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short

# Test paths
testpaths = tests

# Asyncio mode
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    ml: ML-related tests
    asyncio: Async tests

# Coverage configuration - Focus only on high-coverage modules
[coverage:run]
# Only cover specific modules that can achieve 90%+
source = 
    app/core/config
    app/database/models
    app/market_data/data_feed
    app/metrics

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
