apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-trading-backend
  labels:
    app: ai-trading
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-trading
      component: backend
  template:
    metadata:
      labels:
        app: ai-trading
        component: backend
    spec:
      containers:
      - name: backend
        image: ai-trading:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ai-trading-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: ai-trading-config
              key: redis-url
        - name: DEMO_MODE
          value: "true"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-trading-service
  labels:
    app: ai-trading
spec:
  selector:
    app: ai-trading
    component: backend
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  type: LoadBalancer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-trading-config
  labels:
    app: ai-trading
data:
  redis-url: "redis://redis:6379"
  log-level: "INFO"
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-trading-secrets
  labels:
    app: ai-trading
type: Opaque
stringData:
  database-url: "postgresql://user:password@postgres:5432/aitrading"
  secret-key: "your-secret-key-change-this"
