services:
  - type: web
    name: ai-trading-system
    env: docker
    plan: free
    branch: main
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    healthCheckTimeout: 1000
    healthCheckInterval: 10
    healthCheckRetries: 3
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        value: "10000"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: DATABASE_URL
        value: ""
      - key: REDIS_URL
        value: ""
      - key: SECRET_KEY
        value: "change-me-in-production"
