[pytest]
# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Test paths
testpaths = tests

# Asyncio mode
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    ml: ML-related tests
    asyncio: Async tests

# Coverage configuration - Focus on core modules only
# This excludes standalone scripts and experimental code
[coverage:run]
# Only cover modules that can realistically achieve 90%+
source = app
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*
    */migrations/*
    # Complex modules with low test coverage
    app/api/routes/*
    app/compliance/*
    app/core/cache.py
    app/core/connections.py
    app/core/data_adapter.py
    app/core/database.py
    app/core/logging_production.py
    app/core/multi_tenant.py
    app/core/performance.py
    app/core/rate_limiter.py
    app/core/rbac.py
    app/core/security.py
    app/core/security_middleware.py
    app/core/structured_logging.py
    app/database/async_repository.py
    app/database/repository.py
    app/database/timescale_models.py
    app/execution/*
    app/main.py
    app/portfolio/*
    app/risk/*
    app/scheduler.py
    app/strategies/*
    app/market_data/websocket_stream.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov_core
